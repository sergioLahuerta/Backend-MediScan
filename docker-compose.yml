services:
  mysql:
    image: mysql:8.0
    container_name: mediscan-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: yourStrongPassword
      MYSQL_DATABASE: MediScanDB
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Backend-MediScan/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./Backend-MediScan/db/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  backend:
    build:
      context: ./Backend-MediScan
      dockerfile: Dockerfile
    container_name: mediscan-api
    depends_on:
      - mysql
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=MediScanDB;Uid=root;Pwd=yourStrongPassword;Port=3306;AllowUserVariables=true
      - ASPNETCORE_ENVIRONMENT=Development
      - JWT__Key=super_secret_key_mediscan_min_32_characters_1234!
      - JWT__Issuer=MediScanApi
      - Groq__ApiKey=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
    ports:
      - "5073:8080"

  frontend:
    build:
      context: ./Frontend-MediScan/vue-app
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5073/api
    container_name: mediscan-app
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql-data:
